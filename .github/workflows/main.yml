name: MLOps Pipeline

on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Permet le lancement manuel

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p logs mlruns
    
    - name: List files before training
      run: ls -la
    
    - name: Train model
      run: python train.py
    
    - name: List files after training
      run: |
        ls -la
        ls -la mlruns/ || echo "mlruns folder created"
    
    - name: Verify model files
      run: |
        test -f model.joblib && echo "✓ model.joblib exists" || echo "❌ model.joblib missing"
        test -f reference_data.csv && echo "✓ reference_data.csv exists" || echo "❌ reference_data.csv missing"
        test -f data_schema.json && echo "✓ data_schema.json exists" || echo "❌ data_schema.json missing"
    
    - name: Start API and test
      run: |
        # Démarrer l'API
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        # Attendre le démarrage
        sleep 10
        # Tester l'API
        curl -X POST http://localhost:8000/predict \
          -H "Content-Type: application/json" \
          -d '{"satisfaction":0.5,"last_evaluation":0.5,"projects":3,"monthly_hours":200,"tenure":3,"work_accident":0,"promoted_last_5years":0,"salary_level":2}'
        echo "\n✓ API test completed"
    
    - name: Run monitoring test
      run: |
        # Créer quelques données de test dans logs
        echo "satisfaction,last_evaluation,projects,monthly_hours,tenure,work_accident,promoted_last_5years,salary_level" > logs/current_data.csv
        echo "0.2,0.3,6,310,1,0,0,1" >> logs/current_data.csv
        echo "0.1,0.2,7,330,1,0,0,1" >> logs/current_data.csv
        # Lancer le monitoring si le fichier existe
        if [ -f monitor.py ]; then
          python monitor.py
        else
          echo "⚠️ monitor.py not found, skipping"
        fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t ml-churn-api:latest .
    
    - name: Test Docker container
      run: |
        docker run -d -p 8000:8000 --name ml-api ml-churn-api:latest
        sleep 10
        docker ps
        curl -X POST http://localhost:8000/predict \
          -H "Content-Type: application/json" \
          -d '{"satisfaction":0.5,"last_evaluation":0.5,"projects":3,"monthly_hours":200,"tenure":3,"work_accident":0,"promoted_last_5years":0,"salary_level":2}'
        docker stop ml-api
        docker rm ml-api